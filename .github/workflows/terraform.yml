name: Terraform Deploy

on:
  push:
    branches:
      - main

jobs:
  terraform:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v3

    - name: Setup Terraform
      uses: hashicorp/setup-terraform@v3

    # 🔐 Login to Azure
    - name: Azure Login
      uses: azure/login@v1
      with:
        creds: ${{ secrets.AZURE_CREDENTIALS }}

    # 🔥 Init (now WITH backend)
    - name: Terraform Init
      run: terraform init

    # 🔍 Plan
    - name: Terraform Plan
      run: terraform plan

    # 🚀 Apply (AUTO DEPLOY)
    - name: Terraform Apply
      run: terraform apply -auto-approve
